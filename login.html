<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SnapNature — Login</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <div class="topbar">
      <div class="brand">
        <span class="mark">🌿</span> SnapNature
        <span class="tagline">Field Catalogue</span>
      </div>
      <nav>
        <a href="index.html">Home Feed</a>
        <a href="upload.html">Submit a Discovery</a>
        <a href="admin.html">Admin</a>
        <span class="auth-status" id="authStatus"></span>
      </nav>
    </div>
    <div class="hero-body">
      <div class="hero-eyebrow">Field user account</div>
      <h1>Sign in to contribute.</h1>
      <p>An account lets the catalogue credit your discoveries to you.</p>
    </div>
  </div>
</header>
<div class="perf-strip"></div>

<main class="page">

  <!-- Shown when logged out -->
  <div id="authFormWrap" class="auth-card">
    <h2 style="text-align:center;">Welcome</h2>

    <div class="auth-toggle">
      <button type="button" id="tabSignIn" class="active">Sign in</button>
      <button type="button" id="tabSignUp">Create account</button>
    </div>

    <form id="authForm">
      <div class="field" id="nameField" style="display:none;">
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="e.g. Hairyll Adam" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="text" id="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="text" id="password" placeholder="At least 6 characters" required />
      </div>

      <button type="submit" id="authSubmitBtn" class="btn btn-primary" style="width:100%;">Sign in</button>

      <div id="authStatusMsg" class="status-msg"></div>
    </form>
  </div>

  <!-- Shown when already logged in -->
  <div id="signedInPanel" class="signed-in-panel" style="display:none;">
    <h3>You're signed in</h3>
    <p id="signedInAs" style="color:var(--ink-soft); font-size:0.9rem;"></p>
    <a href="upload.html" class="btn btn-primary" style="display:inline-block; margin-top:10px; text-decoration:none;">Submit a discovery</a>
  </div>

</main>

<footer class="site-footer">SNAPNATURE · CSC264 INDIVIDUAL PROJECT PROPOSAL</footer>

<script type="module" src="js/auth-nav.js"></script>
<script type="module" src="js/login.js"></script>
</body>
</html>
